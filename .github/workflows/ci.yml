name: CloudMart CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ==========================================
  # 1. NODE.JS PART (e.g., order-service)
  # ==========================================
  test-node-services:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies and Test (order-service)
        working-directory: ./services/order-service
        run: |
          npm install
          npm test -- --passWithNoTests

  # ==========================================
  # 2. PYTHON PART (e.g., user-service)
  # ==========================================
  test-python-services:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Recommended in your assignment

      - name: Install Dependencies and Test (user-service)
        working-directory: ./services/user-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8
          flake8 --max-line-length=120 . 
          pytest

  # ==========================================
  # 3. BUILD, SCAN, AND PUSH (Example for user-service)
  # ==========================================
  build-scan-push-user-service:
    needs: test-python-services # Waits for Python tests to pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image for User Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: cloudmart-user-service
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./services/user-service
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          echo "FULL_IMAGE_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FULL_IMAGE_NAME }}
          format: 'table'
          exit-code: '1' # Fails the pipeline on CRITICAL vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push Image to ECR
        run: docker push ${{ env.FULL_IMAGE_NAME }}

  # ==========================================
  # 4. KUBERNETES MANIFEST VALIDATION
  # ==========================================
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Validate Kubernetes Manifests
        run: kubeconform -summary -strict -skip ScaledObject,TriggerAuthentication k8s/
