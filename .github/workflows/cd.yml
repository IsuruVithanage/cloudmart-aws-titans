name: CloudMart CD Pipeline

# This workflow only runs after the CI pipeline completes successfully
on:
  workflow_run:
    workflows: ["CloudMart CI Pipeline"]
    types:
      - completed
    branches: [ "main", "develop" ]

# Explicit permissions required for the GitHub Action to push commits back to the repository
permissions:
  contents: write

jobs:
  update-gitops-repo:
    # Proceed with updating the repo only if the CI workflow was a success
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Required to allow GitHub Actions to push commits back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm Image Tags
        run: |
          # Grab the Git SHA from the CI pipeline that just built the images
          NEW_TAG="${{ github.event.workflow_run.head_sha }}"
          echo "Updating Helm charts to use image tag: $NEW_TAG"
          
          # Use sed to find the 'tag: ...' line and replace it with the new Git SHA
          # This updates all 5 environment values files
          sed -i "s/tag: .*/tag: \"$NEW_TAG\"/g" helm/cloudmart-service/values-frontend.yaml
          sed -i "s/tag: .*/tag: \"$NEW_TAG\"/g" helm/cloudmart-service/values-product.yaml
          sed -i "s/tag: .*/tag: \"$NEW_TAG\"/g" helm/cloudmart-service/values-order.yaml
          sed -i "s/tag: .*/tag: \"$NEW_TAG\"/g" helm/cloudmart-service/values-user.yaml
          sed -i "s/tag: .*/tag: \"$NEW_TAG\"/g" helm/cloudmart-service/values-notification.yaml

      - name: Commit and Push Changes
        run: |
          # Configure the Git bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the modified values files
          git add helm/cloudmart-service/values-*.yaml
          
          # Only commit and push if there are actual changes detected
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(gitops): update image tags to $NEW_TAG [skip ci]" && git push)

  smoke-test:
    needs: update-gitops-repo
    runs-on: ubuntu-latest
    steps:
      - name: Wait for ArgoCD to Sync
        run: |
          echo "Waiting 60 seconds for ArgoCD to detect changes and sync to AWS EKS..."
          sleep 60

      - name: HTTP Health Check for Frontend
        run: |
          echo "Testing Frontend Application..."
          curl -f http://<ඔබගේ-INGRESS-හෝ-LOAD-BALANCER-URL>/ || exit 1
          echo "Frontend is up and running!"

      - name: HTTP Health Check for Product Service Readiness
        run: |
          echo "Testing Product Service..."
          curl -f http://<ඔබගේ-INGRESS-හෝ-LOAD-BALANCER-URL>/api/product/health || exit 1
          echo "Product Service is responding correctly!"
