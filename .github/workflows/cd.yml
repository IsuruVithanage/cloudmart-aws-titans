name: CloudMart CD Pipeline

# This workflow only runs after the CI pipeline completes successfully
on:
  workflow_run:
    workflows: ["CloudMart CI Pipeline"]
    types:
      - completed
    branches: [ "main", "develop" ]

jobs:
  deploy-to-eks:
    # Proceed with deployment only if the CI workflow was a success
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Select the Target Environment
      - name: Set target environment (Staging vs Prod)
        id: set-env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "NAMESPACE=cloudmart-prod" >> $GITHUB_ENV
            echo "Deploying to PRODUCTION environment"
          else
            echo "NAMESPACE=cloudmart-staging" >> $GITHUB_ENV
            echo "Deploying to STAGING environment"
          fi

      # 2. Provide AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3. Connect to the AWS EKS Cluster
      - name: Update Kubeconfig
        run: |
          # Replace 'cloudmart-cluster' with the actual name of your EKS cluster
          aws eks update-kubeconfig --region ap-south-1 --name cloudmart-cluster

      # 4. Deploy Kubernetes Manifests
      - name: Deploy Frontend
        run: |
          kubectl set image deployment/frontend frontend=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/frontend:${{ github.event.workflow_run.head_sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }}

      - name: Deploy Product Service
        run: |
          kubectl set image deployment/product-service product-service=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/product-service:${{ github.event.workflow_run.head_sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/product-service -n ${{ env.NAMESPACE }}

      - name: Deploy Order Service
        run: |
          kubectl set image deployment/order-service order-service=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/order-service:${{ github.event.workflow_run.head_sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/order-service -n ${{ env.NAMESPACE }}

      - name: Deploy User Service
        run: |
          kubectl set image deployment/user-service user-service=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/user-service:${{ github.event.workflow_run.head_sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/user-service -n ${{ env.NAMESPACE }}

      - name: Deploy Notification Service
        run: |
          kubectl set image deployment/notification-service notification-service=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/notification-service:${{ github.event.workflow_run.head_sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/notification-service -n ${{ env.NAMESPACE }}
