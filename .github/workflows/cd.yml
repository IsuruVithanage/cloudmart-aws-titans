name: CloudMart CD Pipeline

# This workflow only runs after the CI pipeline completes successfully
on:
  workflow_run:
    workflows: ["CloudMart CI Pipeline"]
    types:
      - completed
    branches: [ "main", "develop" ]

jobs:
  deploy-to-eks:
    # Proceed with deployment only if the CI workflow was a success
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Select the Target Environment
      - name: Set target environment (Staging vs Prod)
        id: set-env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "NAMESPACE=cloudmart-prod" >> $GITHUB_ENV
            echo "Deploying to PRODUCTION environment"
          else
            echo "NAMESPACE=cloudmart-staging" >> $GITHUB_ENV
            echo "Deploying to STAGING environment"
          fi

      # 2. Provide AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3. Connect to the AWS EKS Cluster
      - name: Update Kubeconfig
        run: |
          # Updated to match your actual cluster name from your logs
          aws eks update-kubeconfig --region ap-south-1 --name cloudmart-eks

      # 4. Deploy using Helm instead of kubectl
      - name: Deploy Frontend via Helm
        run: |
          helm upgrade --install frontend ./helm/cloudmart-service \
            --namespace ${{ env.NAMESPACE }} \
            -f ./helm/cloudmart-service/values-frontend.yaml \
            --set image.tag=${{ github.event.workflow_run.head_sha }}

      - name: Deploy Product Service via Helm
        run: |
          helm upgrade --install product-service ./helm/cloudmart-service \
            --namespace ${{ env.NAMESPACE }} \
            -f ./helm/cloudmart-service/values-product.yaml \
            --set image.tag=${{ github.event.workflow_run.head_sha }}

      - name: Deploy Order Service via Helm
        run: |
          helm upgrade --install order-service ./helm/cloudmart-service \
            --namespace ${{ env.NAMESPACE }} \
            -f ./helm/cloudmart-service/values-order.yaml \
            --set image.tag=${{ github.event.workflow_run.head_sha }}

      - name: Deploy User Service via Helm
        run: |
          helm upgrade --install user-service ./helm/cloudmart-service \
            --namespace ${{ env.NAMESPACE }} \
            -f ./helm/cloudmart-service/values-user.yaml \
            --set image.tag=${{ github.event.workflow_run.head_sha }}

      - name: Deploy Notification Service via Helm
        run: |
          helm upgrade --install notification-service ./helm/cloudmart-service \
            --namespace ${{ env.NAMESPACE }} \
            -f ./helm/cloudmart-service/values-notification.yaml \
            --set image.tag=${{ github.event.workflow_run.head_sha }}
