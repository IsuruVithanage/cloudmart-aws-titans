serviceName: "frontend"
namespace: "cloudmart-prod"
replicaCount: 2

image:
  repository: "787308166325.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/frontend"
  tag: "ce48e3548f04cbe03df3eadd7b76bca501d01222"

service:
  type: "ClusterIP"
  port: 80
  targetPort: 80

probes:
  readinessPath: "/health"
  livenessPath: "/health"

autoscaling:
  enabled: false

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

securityContext:
  runAsUser: 101