# ==================== ALB Ingress — Path-Based Routing ====================
# Pre-requisite: Install AWS Load Balancer Controller:
#   helm repo add eks https://aws.github.io/eks-charts
#   helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system \
#     --set clusterName=cloudmart-eks \
#     --set serviceAccount.create=true \
#     --set serviceAccount.name=aws-load-balancer-controller
#
# Section 3.3 [M] — Ingress resource with AWS ALB annotations

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudmart-ingress
  namespace: cloudmart-prod
  labels:
    app: cloudmart
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/subnets: subnet-0ccaade8593953c72,subnet-07916292d4c8b6baf
    alb.ingress.kubernetes.io/security-groups: sg-09e6ab52de24ff610
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/group.name: cloudmart
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:ap-south-1:787308166325:regional/webacl/cloudmart-waf/76724345-bc0c-42c8-8773-70539a1f8c88
spec:
  rules:
  - http:
      paths:
      # Product Service API routes
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: product-service
            port:
              number: 8001
      - path: /api/categories
        pathType: Prefix
        backend:
          service:
            name: product-service
            port:
              number: 8001
      # Order Service API routes
      - path: /api/orders
        pathType: Prefix
        backend:
          service:
            name: order-service
            port:
              number: 8002
      # User Service API routes
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 8003
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 8003
      # Frontend — default catch-all (must be last)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
