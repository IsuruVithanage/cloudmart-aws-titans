apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: cloudmart-prod
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
    spec:
      # TODO: Add serviceAccountName for workload identity
      # serviceAccountName: order-service-sa
      containers:
      - name: order-service
        image: <YOUR-REGISTRY>/order-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: PORT
          value: "8002"
        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: PRODUCT_SERVICE_URL
        - name: QUEUE_BACKEND
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: ORDER_QUEUE_BACKEND
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: cloudmart-prod
spec:
  selector:
    app: order-service
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: cloudmart-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
