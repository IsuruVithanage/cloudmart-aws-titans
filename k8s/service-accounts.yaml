# ==================== IRSA Service Accounts ====================
# Each ServiceAccount is annotated with an IAM role ARN for workload identity.
# The IAM roles must be created in Terraform with OIDC trust policies
# matching the EKS cluster's OIDC provider.
# Section 3.4 [M] — Workload identity for all backend services

---
# product-service: DynamoDB read/write on cloudmart-products table only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service-sa
  namespace: cloudmart-prod
  labels:
    app: product-service
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::854215217603:role/cloudmart-product-service-role
---
# order-service: SQS send/receive on cloudmart-orders queue only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service-sa
  namespace: cloudmart-prod
  labels:
    app: order-service
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::854215217603:role/cloudmart-order-service-role
---
# notification-service: SQS receive/delete on orders queue + SES send email
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service-sa
  namespace: cloudmart-prod
  labels:
    app: notification-service
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::854215217603:role/cloudmart-notification-service-role
---
# user-service: Secrets Manager read on cloudmart/* secrets only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service-sa
  namespace: cloudmart-prod
  labels:
    app: user-service
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::854215217603:role/cloudmart-user-service-role
