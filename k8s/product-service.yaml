apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: cloudmart-prod
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: product-service
    spec:
      # TODO: Add serviceAccountName for workload identity
      # serviceAccountName: product-service-sa
      containers:
      - name: product-service
        image: <YOUR-REGISTRY>/product-service:latest   # Replace with your registry URI
        ports:
        - containerPort: 8001
        env:
        - name: PORT
          value: "8001"
        - name: STORE_BACKEND
          valueFrom:
            configMapKeyRef:
              name: cloudmart-config
              key: PRODUCT_STORE_BACKEND
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: cloudmart-prod
spec:
  selector:
    app: product-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: cloudmart-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
